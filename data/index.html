<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f6f9;
      --card:        #ffffff;
      --border:      #e2e8f0;
      --text:        #1a202c;
      --sub:         #94a3b8;
      --label:       #64748b;
      --input-bg:    #f8fafc;
      --input-border:#e2e8f0;
      --btn-bg:      #1e293b;
      --btn-text:    #ffffff;
      --btn-hover:   #0f172a;
      --ok-bg:       #ecfdf5;
      --ok-text:     #065f46;
      --ok-border:   #a7f3d0;
      --err-bg:      #fff1f2;
      --err-text:    #9f1239;
      --err-border:  #fecdd3;
      --qr-bg:       #f8fafc;
      --qr-border:   #e2e8f0;
      --footer:      #cbd5e1;
      --icon-link:   #94a3b8;
      --divider:     #e2e8f0;
    }

    [data-theme="dark"] {
      --bg:          #030712;
      --card:        #111827;
      --border:      #1f2937;
      --text:        #f9fafb;
      --sub:         #6b7280;
      --label:       #6b7280;
      --input-bg:    #1f2937;
      --input-border:#374151;
      --btn-bg:      #ffffff;
      --btn-text:    #111827;
      --btn-hover:   #f1f5f9;
      --qr-bg:       #1f2937;
      --qr-border:   #374151;
      --footer:      #374151;
      --icon-link:   #6b7280;
      --divider:     #1f2937;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background .3s;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      box-shadow: 0 8px 30px rgba(0,0,0,.06);
      transition: background .3s, border-color .3s;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }
    .card-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text);
      line-height: 1.2;
    }
    .card-header h1 .arrow { color: #3b82f6; }
    .card-header .sub {
      display: block;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .2em;
      color: var(--sub);
      margin-top: .3rem;
    }

    /* ── Theme toggle ── */
    .toggle-btn {
      padding: .45rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--label);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
      flex-shrink: 0;
    }
    .toggle-btn:hover { background: var(--input-bg); }
    [data-theme="dark"] .toggle-btn { color: #facc15; }
    .toggle-btn svg { width: 16px; height: 16px; }

    /* ── Field ── */
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: .68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--label);
      margin-bottom: .5rem;
    }
    .field input {
      width: 100%;
      padding: .7rem 1rem;
      border: 1.5px solid var(--input-border);
      border-radius: 10px;
      background: var(--input-bg);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .3s;
    }
    .field input::placeholder { color: var(--sub); opacity: .6; }
    .field input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,.15);
    }
    .field input.warn {
      border-color: #fca5a5;
      background: rgba(254,202,202,.08);
    }

    /* ── Warning ── */
    .warn-msg {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .73rem;
      font-weight: 500;
      color: #ef4444;
      margin-top: .4rem;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height .25s ease, opacity .25s ease;
    }
    .warn-msg.show { max-height: 2rem; opacity: 1; }

    /* ── Button ── */
    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .75rem 1.5rem;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .btn:hover:not(:disabled)  { background: var(--btn-hover); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(150,150,150,.4);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── QR Preview ── */
    .qr-preview {
      margin-top: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      padding: 1.25rem;
      border-radius: 14px;
      border: 1px solid var(--qr-border);
      background: var(--qr-bg);
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: scale(.94);
      transition: max-height .4s ease, opacity .35s ease, transform .35s ease, background .3s, border-color .3s;
    }
    .qr-preview.show {
      max-height: 320px;
      opacity: 1;
      transform: scale(1);
      overflow: visible;
    }
    .qr-preview p.qr-label {
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--sub);
    }
    .qr-preview img {
      width: 176px;
      height: 176px;
      border-radius: 10px;
      display: block;
    }
    .qr-preview p.qr-value {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--sub);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 .5rem;
    }

    /* ── Status ── */
    .status {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .75rem 1rem;
      border-radius: 10px;
      font-size: .8rem;
      font-weight: 500;
      margin-top: 1rem;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(6px);
      transition: max-height .3s ease, opacity .3s ease, transform .3s ease;
    }
    .status.show { max-height: 5rem; opacity: 1; transform: translateY(0); overflow: visible; }
    .status.ok  { background: var(--ok-bg);  color: var(--ok-text);  border: 1px solid var(--ok-border); }
    .status.err { background: var(--err-bg); color: var(--err-text); border: 1px solid var(--err-border); }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      margin-top: 1.25rem;
      font-size: .7rem;
      color: var(--footer);
      transition: color .3s;
    }
    .footer a {
      display: flex;
      align-items: center;
      gap: .35rem;
      color: var(--icon-link);
      text-decoration: none;
      transition: color .2s;
    }
    .footer a:hover { color: var(--text); }
    .footer a svg { width: 14px; height: 14px; }
    .version { font-family: 'DM Mono', monospace; font-size: .65rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div>
          <h1>TEXT <span class="arrow">&#8594;</span> QR Code<span class="sub">CONVERT &middot; LVGL</span></h1>
        </div>
        <button class="toggle-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          <svg id="iconSun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>

      <!-- Input -->
      <div class="field">
        <label>Your Input</label>
        <input type="text" id="textInput" placeholder="Type URL, text, number&#8230;" autocomplete="off"/>
        <div class="warn-msg" id="warnMsg">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Please enter something before sending.
        </div>
      </div>

      <!-- Button -->
      <button class="btn" id="sendBtn" onclick="handleSubmit()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send
      </button>

      <!-- QR Preview -->
      <div class="qr-preview" id="qrPreview">
        <p class="qr-label">QR Preview</p>
        <img id="qrImg" src="" alt="QR Code"/>
        <p class="qr-value" id="qrValue"></p>
      </div>

      <!-- Status -->
      <div class="status" id="statusMsg"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://github.com/pangcrd" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
        </svg>
        GitHub
      </a>
      <span>|</span>
      <a href="https://youtube.com/@pangcrd" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
        </svg>
        YouTube
      </a>
      <span>|</span>
      <span class="version">v1.0.0</span>
    </div>
  </div>

  <script>
    const input    = document.getElementById('textInput');
    const btn      = document.getElementById('sendBtn');
    const warnMsg  = document.getElementById('warnMsg');
    const statusEl = document.getElementById('statusMsg');
    const qrPreview= document.getElementById('qrPreview');
    const qrImg    = document.getElementById('qrImg');
    const qrVal    = document.getElementById('qrValue');
    let   isDark   = false;

    const SEND_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;

    // ── Theme ──────────────────────────────────────────────────
    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
      document.getElementById('iconMoon').style.display = isDark ? 'none' : '';
      document.getElementById('iconSun').style.display  = isDark ? ''     : 'none';
    }

    // ── Input live validation ──────────────────────────────────
    input.addEventListener('input', () => {
      if (input.value.trim()) {
        input.classList.remove('warn');
        warnMsg.classList.remove('show');
      }
    });

    // ── Submit ─────────────────────────────────────────────────
    async function handleSubmit() {
      const text = input.value.trim();

      if (!text) {
        input.classList.add('warn');
        warnMsg.classList.add('show');
        statusEl.classList.remove('show');
        return;
      }

      // Hide QR + status, show spinner
      qrPreview.classList.remove('show');
      statusEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Sending&hellip;';

      try {
        const res = await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'data=' + encodeURIComponent(text)
        });

        if (res.ok) {
          // Show QR preview
          qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=176x176&data=' + encodeURIComponent(text);
          qrVal.textContent = text;
          qrPreview.offsetHeight; // force reflow
          qrPreview.classList.add('show');
          showStatus(true, 'Complete &#8212; QR code updated on device.');
        } else {
          showStatus(false, 'Fail &#8212; server returned an error.');
        }
      } catch (e) {
        showStatus(false, 'Fail &#8212; could not reach the device.');
      }

      btn.disabled = false;
      btn.innerHTML = SEND_SVG + ' Send';
    }

    // ── Show status ────────────────────────────────────────────
    function showStatus(ok, msg) {
      statusEl.className = 'status ' + (ok ? 'ok' : 'err');
      const icon = ok
        ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
        : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
      statusEl.innerHTML = icon + msg;
      statusEl.offsetHeight;
      statusEl.classList.add('show');
    }
  </script>
</body>
</html>
